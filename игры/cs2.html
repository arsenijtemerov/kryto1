<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #1a1a1a;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: none;
        }
        #gameCanvas {
            background: #2d2d2d;
            cursor: crosshair;
        }
        #menu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            cursor: default;
        }
        h1 {
            font-size: 4rem;
            color: #de9b35;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(222, 155, 53, 0.5);
            margin-bottom: 20px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: linear-gradient(90deg, #3a3a3a, #4a4a4a);
            color: #fff;
            border: 2px solid #de9b35;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn:hover {
            background: #de9b35;
            color: #1a1a1a;
        }
        .weapons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .weapon {
            padding: 10px 20px;
            background: #333;
            color: #888;
            border: 1px solid #555;
            cursor: pointer;
        }
        .weapon.selected {
            background: #de9b35;
            color: #1a1a1a;
            border-color: #de9b35;
        }
        .hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            pointer-events: none;
        }
        .hud-item {
            text-align: center;
        }
        .hud-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }
        .hud-value {
            font-size: 1.5rem;
            color: #de9b35;
            font-weight: bold;
        }
        #crosshair {
            position: absolute;
            width: 4px; height: 4px;
            background: #de9b35;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="crosshair"></div>
    <div id="menu">
        <h1>CS2</h1>
        <button class="btn" onclick="startGame()">Играть</button>
        <div class="weapons">
            <div class="weapon selected" onclick="selectWeapon('ak47')">AK-47</div>
            <div class="weapon" onclick="selectWeapon('m4a4')">M4A4</div>
            <div class="weapon" onclick="selectWeapon('awp')">AWP</div>
        </div>
    </div>
    <div class="hud" id="hud" style="display:none;">
        <div class="hud-item">
            <div class="hud-label">Оружие</div>
            <div class="hud-value" id="weaponName">AK-47</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Патроны</div>
            <div class="hud-value" id="ammo">30/90</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Здоровье</div>
            <div class="hud-value" id="health">100</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const crosshair = document.getElementById('crosshair');
        const menu = document.getElementById('menu');
        const hud = document.getElementById('hud');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let W = canvas.width;
        let H = canvas.height;
        
        const player = {
            x: 200, y: H / 2,
            width: 40, height: 60,
            health: 100,
            speed: 5,
            vx: 0, vy: 0,
            weapon: 'ak47',
            ammo: 30,
            maxAmmo: 30,
            reserveAmmo: 90,
            shooting: false,
            lastShot: 0,
            reloading: false
        };
        
        const weapons = {
            ak47: { damage: 36, fireRate: 100, spread: 8, name: 'AK-47' },
            m4a4: { damage: 28, fireRate: 90, spread: 6, name: 'M4A4' },
            awp: { damage: 115, fireRate: 900, spread: 1, name: 'AWP' }
        };
        
        let enemies = [];
        let bullets = [];
        let particles = [];
        let keys = {};
        let gameRunning = false;
        
        function selectWeapon(w) {
            player.weapon = w;
            player.ammo = weapons[w].maxAmmo;
            document.querySelectorAll('.weapon').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }
        
        function startGame() {
            menu.style.display = 'none';
            hud.style.display = 'flex';
            gameRunning = true;
            player.x = 200;
            player.y = H / 2;
            player.health = 100;
            player.ammo = weapons[player.weapon].maxAmmo;
            enemies = [];
            bullets = [];
            particles = [];
            
            for (let i = 0; i < 5; i++) spawnEnemy();
            updateHUD();
            gameLoop();
        }
        
        function spawnEnemy() {
            enemies.push({
                x: W + 50,
                y: Math.random() * (H - 100) + 50,
                width: 40, height: 60,
                health: 100,
                speed: 2 + Math.random() * 2,
                vx: 0, vy: 0,
                timer: Math.random() * 1000
            });
        }
        
        function createBlood(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: '#8b0000'
                });
            }
        }
        
        function drawMap() {
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#4a4a4a');
            gradient.addColorStop(0.5, '#3a3a3a');
            gradient.addColorStop(1, '#2d2d2d');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            ctx.fillStyle = '#222';
            for (let x = 0; x < W; x += 100) {
                ctx.fillRect(x, 0, 2, H);
            }
            for (let y = 0; y < H; y += 100) {
                ctx.fillRect(0, y, W, 2);
            }
            
            ctx.fillStyle = '#222';
            ctx.fillRect(100, 100, 50, H - 200);
            ctx.fillRect(W - 150, 50, 50, H - 100);
            
            ctx.fillStyle = '#333';
            ctx.fillRect(120, 120, 30, H - 240);
        }
        
        function drawPlayer() {
            const gradient = ctx.createLinearGradient(player.x, player.y - player.height/2, player.x, player.y + player.height/2);
            gradient.addColorStop(0, '#5a5a5a');
            gradient.addColorStop(0.5, '#3a3a3a');
            gradient.addColorStop(1, '#2a2a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height);
            
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(player.x - 15, player.y - player.height/2 + 5, 30, 15);
        }
        
        function drawEnemy(e) {
            const gradient = ctx.createLinearGradient(e.x, e.y - e.height/2, e.x, e.y + e.height/2);
            gradient.addColorStop(0, '#8b4513');
            gradient.addColorStop(0.5, '#654321');
            gradient.addColorStop(1, '#3d2817');
            ctx.fillStyle = gradient;
            ctx.fillRect(e.x - e.width/2, e.y - e.height/2, e.width, e.height);
            
            ctx.fillStyle = '#a52a2a';
            ctx.fillRect(e.x - 12, e.y - e.height/2 + 5, 24, 12);
        }
        
        function drawWeapon() {
            const w = weapons[player.weapon];
            ctx.fillStyle = '#333';
            const baseX = player.x + player.width/2 + 20;
            const baseY = player.y + 20;
            
            if (player.weapon === 'ak47') {
                ctx.fillRect(baseX, baseY, 60, 8);
                ctx.fillRect(baseX + 55, baseY - 5, 15, 18);
            } else if (player.weapon === 'm4a4') {
                ctx.fillRect(baseX, baseY, 50, 7);
                ctx.fillRect(baseX + 45, baseY - 3, 20, 13);
            } else if (player.weapon === 'awp') {
                ctx.fillRect(baseX, baseY + 5, 70, 6);
                ctx.fillRect(baseX + 65, baseY - 8, 12, 22);
            }
            
            if (player.shooting) {
                ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                ctx.fillRect(baseX - 20, baseY - 30, 150, 60);
            }
        }
        
        function draw() {
            drawMap();
            
            for (let b of bullets) {
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            for (let e of enemies) {
                drawEnemy(e);
            }
            
            drawPlayer();
            drawWeapon();
            
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function shoot() {
            const w = weapons[player.weapon];
            const now = Date.now();
            
            if (player.ammo <= 0 || player.reloading || now - player.lastShot < w.fireRate) return;
            
            player.ammo--;
            player.lastShot = now;
            player.shooting = true;
            setTimeout(() => player.shooting = false, 50);
            
            const angle = (Math.random() - 0.5) * w.spread * 0.01;
            const vx = Math.cos(angle) * 20;
            const vy = Math.sin(angle) * 20;
            
            bullets.push({
                x: player.x + player.width + 30,
                y: player.y,
                vx, vy,
                damage: w.damage
            });
            
            updateHUD();
        }
        
        function reload() {
            if (player.ammo >= player.maxAmmo || player.reserveAmmo <= 0 || player.reloading) return;
            
            player.reloading = true;
            updateHUD();
            
            setTimeout(() => {
                const needed = player.maxAmmo - player.ammo;
                const take = Math.min(needed, player.reserveAmmo);
                player.ammo += take;
                player.reserveAmmo -= take;
                player.reloading = false;
                updateHUD();
            }, 2000);
        }
        
        function updateHUD() {
            document.getElementById('weaponName').textContent = weapons[player.weapon].name;
            document.getElementById('ammo').textContent = `${player.ammo}/${player.reserveAmmo}`;
            document.getElementById('health').textContent = player.health;
        }
        
        function update() {
            if (keys['w'] || keys['W']) player.vy = -player.speed;
            else if (keys['s'] || keys['S']) player.vy = player.speed;
            else player.vy = 0;
            
            if (keys['a'] || keys['A']) player.vx = -player.speed;
            else if (keys['d'] || keys['D']) player.vx = player.speed;
            else player.vx = 0;
            
            player.x += player.vx;
            player.y += player.vy;
            player.x = Math.max(player.width, Math.min(W - player.width, player.x));
            player.y = Math.max(player.height/2, Math.min(H - player.height/2, player.y));
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                
                if (bullets[i].x < 0 || bullets[i].x > W) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (bullets[i].x > e.x - e.width/2 && bullets[i].x < e.x + e.width/2 &&
                        bullets[i].y > e.y - e.height/2 && bullets[i].y < e.y + e.height/2) {
                        createBlood(e.x, e.y);
                        e.health -= bullets[i].damage;
                        bullets.splice(i, 1);
                        
                        if (e.health <= 0) {
                            enemies.splice(j, 1);
                            spawnEnemy();
                        }
                        break;
                    }
                }
            }
            
            for (let e of enemies) {
                e.vx = -e.speed;
                e.x += e.vx;
                e.timer += 16;
                
                if (e.timer > 2000 && Math.random() < 0.01) {
                    e.vy = (Math.random() - 0.5) * 4;
                    e.y += e.vy;
                    e.timer = 0;
                }
                
                e.y = Math.max(e.height/2, Math.min(H - e.height/2, e.y));
                
                if (player.x < e.x + e.width/2 && player.x + player.width > e.x - e.width/2 &&
                    player.y < e.y + e.height/2 && player.y + player.height > e.y - e.height/2) {
                    player.health -= 1;
                    updateHUD();
                    
                    if (player.health <= 0) {
                        gameOver();
                        return;
                    }
                }
            }
            
            if (enemies.length < 5) spawnEnemy();
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.03;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }
        
        function gameOver() {
            gameRunning = false;
            menu.style.display = 'flex';
            hud.style.display = 'none';
            menu.querySelector('h1').textContent = 'ИГРА ОКОНЧЕНА';
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === 'r' || e.key === 'R') reload();
        });
        
        document.addEventListener('keyup', e => {
            keys[e.key] = false;
        });
        
        document.addEventListener('mousedown', e => {
            if (gameRunning && e.button === 0) shoot();
        });
        
        document.addEventListener('mousemove', e => {
            crosshair.style.left = e.clientX + 'px';
            crosshair.style.top = e.clientY + 'px';
        });
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            W = canvas.width;
            H = canvas.height;
        });
    </script>
</body>
</html>
