<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .menu-item {
            display: block;
            padding: 20px 40px;
            background: linear-gradient(45deg, #0f3460, #1a1a2e);
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .menu-item:hover {
            transform: scale(1.05);
            border-color: #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        .back {
            margin-top: 30px;
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Выберите игру</h1>
        <div class="menu">
            <a href="тетрис.html" class="menu-item">Тетрис</a>
            <a href="змейка.html" class="menu-item">Змейка</a>
            <a href="../index.html" class="menu-item back">Назад</a>
        </div>
    </div>
</body>
</html>
