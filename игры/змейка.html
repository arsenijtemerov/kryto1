<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1 { color: #fff; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
        .game-container { display: flex; gap: 20px; align-items: flex-start; }
        canvas { background: #0a0a1a; border: 3px solid #00d4ff; border-radius: 5px; }
        .info { color: #fff; font-size: 1.2rem; }
        .score { margin-bottom: 20px; }
        .controls { margin-top: 20px; color: #888; font-size: 0.9rem; text-align: center; }
        a { color: #00d4ff; text-decoration: none; margin-top: 20px; display: block; }
        .btn { 
            background: #e94560; color: #fff; border: none; padding: 10px 20px; 
            font-size: 1rem; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }
        .btn:hover { background: #ff6b6b; }
    </style>
</head>
<body>
    <h1>🐍 Змейка</h1>
    <div class="game-container">
        <canvas id="snake" width="400" height="400"></canvas>
        <div class="info">
            <div class="score">Счёт: <span id="score">0</span></div>
            <div>Рекорд: <span id="highscore">0</span></div>
        </div>
    </div>
    <div class="controls">↑ ↓ ← → движение | P пауза</div>
    <button class="btn" onclick="init()">Рестарт</button>
    <a href="index.html">← К играм</a>
    <script>
        const canvas = document.getElementById('snake');
        const ctx = canvas.getContext('2d');
        const SCALE = 20;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let score = 0;
        let highscore = localStorage.getItem('snakeHighscore') || 0;
        let gameOver = false;
        let paused = false;
        let gameLoop = null;
        
        document.getElementById('highscore').textContent = highscore;
        
        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            direction = { x: 0, y: -1 };
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 150);
        }
        
        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / SCALE));
            food.y = Math.floor(Math.random() * (canvas.height / SCALE));
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }
        
        function update() {
            if (gameOver || paused) {
                draw();
                if (gameOver) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '30px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Игра окончена!', canvas.width / 2, canvas.height / 2);
                    ctx.font = '16px sans-serif';
                    ctx.fillText('Нажми кнопку Рестарт', canvas.width / 2, canvas.height / 2 + 30);
                }
                if (paused) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '30px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('ПАУЗА', canvas.width / 2, canvas.height / 2);
                }
                return;
            }
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (head.x < 0 || head.x >= canvas.width / SCALE || head.y < 0 || head.y >= canvas.height / SCALE) {
                gameOver = true;
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver = true;
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('snakeHighscore', highscore);
                    document.getElementById('highscore').textContent = highscore;
                }
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x * SCALE, food.y * SCALE, SCALE - 1, SCALE - 1);
            
            ctx.fillStyle = '#00ff00';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#00ff00' : '#00cc00';
                ctx.fillRect(snake[i].x * SCALE, snake[i].y * SCALE, SCALE - 1, SCALE - 1);
            }
        }
        
        document.addEventListener('keydown', event => {
            if (event.key === 'p' || event.key === 'P') {
                paused = !paused;
                return;
            }
            if (event.key === 'ArrowUp' && direction.y !== 1) direction = { x: 0, y: -1 };
            if (event.key === 'ArrowDown' && direction.y !== -1) direction = { x: 0, y: 1 };
            if (event.key === 'ArrowLeft' && direction.x !== 1) direction = { x: -1, y: 0 };
            if (event.key === 'ArrowRight' && direction.x !== -1) direction = { x: 1, y: 0 };
        });
        
        init();
    </script>
</body>
</html>
