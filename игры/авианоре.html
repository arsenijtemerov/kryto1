<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Авианоре</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0f172a;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
        }
        #gameCanvas {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let W, H;
        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }
        resize();
        window.addEventListener('resize', resize);
        
        const player = { x: 0, y: 0, w: 0, h: 0, vy: 0, targetY: 0 };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let score = 0;
        let highscore = localStorage.getItem('aviaHighVert') || 0;
        let gameOver = false;
        let lastTime = 0;
        let difficulty = 1;
        
        function init() {
            player.x = W * 0.2;
            player.y = H * 0.5;
            player.w = W * 0.12;
            player.h = W * 0.12;
            player.vy = 0;
            player.targetY = player.y;
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            difficulty = 1;
            gameOver = false;
            
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }
        
        function spawnEnemy() {
            const size = W * (0.06 + Math.random() * 0.04);
            enemies.push({
                x: W + size,
                y: Math.random() * (H - size * 2) + size,
                w: size,
                h: size * 0.7,
                speed: H * (0.002 + Math.random() * 0.001) * difficulty,
                turn: Math.random() > 0.5 ? 1 : -1,
                turnTimer: 0
            });
        }
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = H * (0.005 + Math.random() * 0.008);
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color
                });
            }
        }
        
        function drawStar(x, y, size, opacity) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.fill();
        }
        
        function drawPlayer(x, y, w, h) {
            const gradient = ctx.createLinearGradient(x, y - h/2, x + w, y + h/2);
            gradient.addColorStop(0, '#22d3ee');
            gradient.addColorStop(0.5, '#06b6d4');
            gradient.addColorStop(1, '#0891b2');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.8, y);
            ctx.lineTo(x, y - h * 0.4);
            ctx.lineTo(x + w * 0.3, y);
            ctx.lineTo(x, y + h * 0.4);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#fee';
            ctx.shadowColor = '#22d3ee';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(x + w * 0.5, y - h * 0.1, w * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#c084fc';
            ctx.fillRect(x + w * 0.1, y - h * 0.15, w * 0.3, h * 0.1);
        }
        
        function drawEnemy(x, y, w, h) {
            const gradient = ctx.createLinearGradient(x, y - h/2, x + w, y + h/2);
            gradient.addColorStop(0, '#f87171');
            gradient.addColorStop(0.5, '#ef4444');
            gradient.addColorStop(1, '#dc2626');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + w * 0.5, y - h * 0.4);
            ctx.lineTo(x + w, y - h * 0.2);
            ctx.lineTo(x + w, y + h * 0.2);
            ctx.lineTo(x + w * 0.5, y + h * 0.4);
            ctx.lineTo(x, y);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#fef';
            ctx.beginPath();
            ctx.arc(x + w * 0.75, y - h * 0.1, w * 0.08, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function draw() {
            const bgGradient = ctx.createLinearGradient(0, 0, 0, H);
            bgGradient.addColorStop(0, '#0c1842');
            bgGradient.addColorStop(0.5, '#142550');
            bgGradient.addColorStop(1, '#0c1842');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, W, H);
            
            for (let s of stars) {
                drawStar(s.x, s.y, s.size, s.size / 3);
            }
            
            ctx.fillStyle = '#fbbf24';
            ctx.shadowColor = '#fbbf24';
            ctx.shadowBlur = 8;
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            
            for (let e of enemies) {
                drawEnemy(e.x, e.y, e.w, e.h);
            }
            
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, W * 0.015, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            
            if (!gameOver) {
                drawPlayer(player.x, player.y, player.w, player.h);
            }
            
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${W * 0.06}px 'Quicksand', sans-serif`;
            ctx.textAlign = 'left';
            ctx.shadowColor = '#22d3ee';
            ctx.shadowBlur = 10;
            ctx.fillText(score, W * 0.03, H * 0.08);
            ctx.shadowBlur = 0;
            
            ctx.font = `${W * 0.035}px 'Quicksand', sans-serif`;
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText(`★ ${highscore}`, W * 0.03, H * 0.14);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                ctx.fillRect(0, 0, W, H);
                
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${W * 0.12}px 'Quicksand', sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('ИГРА', W * 0.5, H * 0.38);
                ctx.fillStyle = '#f87171';
                ctx.fillText('ОКОНЧЕНА', W * 0.5, H * 0.5);
                
                ctx.font = `${W * 0.05}px 'Quicksand', sans-serif';
                ctx.fillStyle = '#22d3ee';
                ctx.fillText(`Счёт: ${score}`, W * 0.5, H * 0.62);
                
                ctx.fillStyle = '#fbbf24';
                ctx.fillText(`Рекорд: ${highscore}`, W * 0.5, H * 0.72);
                
                ctx.font = `${W * 0.04}px 'Quicksand', sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText('Тапни для рестарта', W * 0.5, H * 0.85);
            }
        }
        
        let spawnTimer = 0;
        let lastTouchY = null;
        
        function update(time) {
            const dt = Math.min(time - lastTime, 50);
            lastTime = time;
            
            if (gameOver) {
                draw();
                requestAnimationFrame(update);
                return;
            }
            
            for (let s of stars) {
                s.y += s.speed * dt * 0.5;
                if (s.y > H) {
                    s.y = 0;
                    s.x = Math.random() * W;
                }
            }
            
            player.y += (player.targetY - player.y) * 0.15;
            player.y = Math.max(player.h * 0.5, Math.min(H - player.h * 0.5, player.y));
            
            spawnTimer += dt;
            const spawnInterval = Math.max(600, 1200 - difficulty * 100);
            if (spawnTimer > spawnInterval) {
                spawnEnemy();
                spawnTimer = 0;
            }
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].speed * dt;
                if (bullets[i].x > W + 50) bullets.splice(i, 1);
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x -= e.speed * dt;
                
                e.turnTimer += dt;
                if (e.turnTimer > 1500) {
                    e.turn = e.turn * -1;
                    e.turnTimer = 0;
                }
                if (Math.random() < 0.01) e.turn *= -1;
                e.y += e.turn * e.speed * 0.5 * dt;
                e.y = Math.max(e.h * 0.5, Math.min(H - e.h * 0.5, e.y));
                
                if (e.x + e.w < -50) {
                    enemies.splice(i, 1);
                    continue;
                }
                
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (b.x > e.x && b.x < e.x + e.w && b.y > e.y - e.h/2 && b.y < e.y + e.h/2) {
                        createExplosion(e.x + e.w/2, e.y, '#fbbf24');
                        score += 10;
                        difficulty = Math.min(5, 1 + score / 500);
                        if (score > highscore) {
                            highscore = score;
                            localStorage.setItem('aviaHighVert', highscore);
                        }
                        bullets.splice(j, 1);
                        enemies.splice(i, 1);
                        break;
                    }
                }
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (player.x < e.x + e.w && player.x + player.w * 0.8 > e.x &&
                    player.y - player.h * 0.3 < e.y + e.h/2 && player.y + player.h * 0.3 > e.y - e.h/2) {
                    createExplosion(player.x, player.y, '#22d3ee');
                    gameOver = true;
                }
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx * dt;
                particles[i].y += particles[i].vy * dt;
                particles[i].life -= 0.015;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (gameOver) {
                init();
                return;
            }
            lastTouchY = e.touches[0].clientY;
            bullets.push({
                x: player.x + player.w,
                y: player.y,
                r: W * 0.02,
                speed: W * 0.012
            });
        });
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (lastTouchY !== null && !gameOver) {
                const ty = e.touches[0].clientY;
                player.targetY = ty;
                lastTouchY = ty;
            }
        });
        
        canvas.addEventListener('touchend', e => {
            lastTouchY = null;
        });
        
        canvas.addEventListener('click', () => {
            if (gameOver) {
                init();
                return;
            }
            bullets.push({
                x: player.x + player.w,
                y: player.y,
                r: W * 0.02,
                speed: W * 0.012
            });
        });
        
        canvas.addEventListener('mousemove', e => {
            if (!gameOver) {
                player.targetY = e.clientY;
            }
        });
        
        init();
        requestAnimationFrame(update);
    </script>
</body>
</html>
